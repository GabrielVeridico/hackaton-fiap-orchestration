# Zabbix Agent 2 como DaemonSet — coleta de host/nó (CPU, memória, disco) em
# cada nó do AKS (RNF27). Opera em modo ATIVO: o agent inicia a conexão com o
# zabbix-server (não escuta exposto na rede do host).
#
# Endurecimento (least-privilege): sem privileged, sem hostNetwork/hostPID, sem
# mount do root do host. Lê métricas só de /proc e /sys (read-only).
#
# Aplicar:
#   kubectl apply -f observability/zabbix/zabbix-agent-daemonset.yaml
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: zabbix-agent
  namespace: observability
  labels:
    app: zabbix-agent
spec:
  selector:
    matchLabels:
      app: zabbix-agent
  template:
    metadata:
      labels:
        app: zabbix-agent
    spec:
      # Não agenda em nós control-plane (toleração restrita aos nós de workload).
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 1997          # uid do usuário zabbix na imagem oficial
        fsGroup: 1997
      containers:
        - name: zabbix-agent2
          # Pino por tag de release (substitua por digest sha256 em produção).
          image: zabbix/zabbix-agent2:alpine-6.4-latest
          env:
            # Modo ATIVO: agent conecta no server; sem checks passivos expostos.
            - name: ZBX_SERVER_HOST
              value: zabbix-server.observability.svc.cluster.local
            - name: ZBX_PASSIVE_ALLOW
              value: "false"
            - name: ZBX_ACTIVE_ALLOW
              value: "true"
            - name: ZBX_HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            # A imagem zabbix-agent2 edita seus configs em /etc/zabbix e escreve
            # log em /tmp no startup; readOnlyRootFilesystem=true causa CrashLoop
            # ("Read-only file system"). Mantido non-root + drop ALL caps.
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: sys
              mountPath: /host/sys
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: proc
          hostPath:
            path: /proc
        - name: sys
          hostPath:
            path: /sys
