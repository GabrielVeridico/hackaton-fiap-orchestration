# Values para o chart kube-prometheus-stack (Prometheus Operator + Grafana + Alertmanager).
#
# Instalação:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo update
#   kubectl create namespace observability
#   helm upgrade --install kube-prometheus-stack \
#     prometheus-community/kube-prometheus-stack \
#     -n observability -f observability/prometheus/values.yaml
#
# Os serviços expõem /metrics (OpenTelemetry). O chart conexao-service cria um
# ServiceMonitor quando metrics.serviceMonitor.enabled=true (label release=kube-prometheus-stack).

prometheus:
  prometheusSpec:
    retention: 7d
    # Mantém o default (descobre apenas objetos rotulados release=kube-prometheus-stack).
    # O chart conexao-service já aplica esse label no ServiceMonitor — nada de
    # descoberta cluster-wide irrestrita.
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi

grafana:
  enabled: true
  # Sem senha inline (RNF21): o chart gera uma senha aleatória no Secret do Grafana.
  # Recupere com:
  #   kubectl -n observability get secret kube-prometheus-stack-grafana \
  #     -o jsonpath="{.data.admin-password}" | base64 -d
  # Em produção, aponte para um Secret externo via admin.existingSecret.
  defaultDashboardsEnabled: true
  sidecar:
    dashboards:
      enabled: true
      # Importa dashboards de ConfigMaps com este label, apenas no namespace observability.
      label: grafana_dashboard
      searchNamespace: observability

alertmanager:
  enabled: true

# Métricas de nó/kubelet/cadvisor já vêm habilitadas por padrão no stack.
nodeExporter:
  enabled: true
kubeStateMetrics:
  enabled: true
