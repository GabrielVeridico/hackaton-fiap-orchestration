{{- if .Values.keyVault.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "conexao-service.name" . }}-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "conexao-service.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ .Values.keyVault.clientID | quote }}
    tenantId: {{ .Values.keyVault.tenantId | quote }}
    keyvaultName: {{ .Values.keyVault.name | quote }}
    objects: |
      array:
        {{- range .Values.keyVaultObjects }}
        - |
          objectName: {{ .objectName }}
          objectType: secret
        {{- end }}
  secretObjects:
    - secretName: {{ include "conexao-service.name" . }}-secret
      type: Opaque
      data:
        {{- range .Values.keyVaultObjects }}
        - objectName: {{ .objectName }}
          key: {{ .key }}
        {{- end }}
{{- end }}
