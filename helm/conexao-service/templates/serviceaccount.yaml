{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-{{ include "conexao-service.name" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "conexao-service.labels" . | nindent 4 }}
  {{- if .Values.serviceAccount.workloadIdentity }}
  annotations:
    azure.workload.identity/client-id: {{ .Values.keyVault.clientID | quote }}
  {{- end }}
{{- end }}
