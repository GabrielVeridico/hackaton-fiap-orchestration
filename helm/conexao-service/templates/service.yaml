apiVersion: v1
kind: Service
metadata:
  name: {{ include "conexao-service.name" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "conexao-service.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "conexao-service.name" . }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
