# Exemplo de Secret da UserAPI. NÃO commite valores reais.
# Uso: copie para secret.yaml, preencha e aplique (kubectl apply -f secret.yaml).
# Em AKS, prefira o Helm chart com Azure Key Vault (CSI) em vez deste Secret.
apiVersion: v1
kind: Secret
metadata:
  name: hackatonfiap-users-secret
  namespace: conexao-solidaria
type: Opaque
stringData:
  ConnectionStrings__Default: "Server=sqlserver,1433;Database=HackatonFiapUsersDb;User Id=sa;Password=CHANGE_ME;TrustServerCertificate=true;"
  Jwt__Key: "CHANGE_ME_min_32_bytes_random_key________________"
  Owner__Password: "CHANGE_ME"
