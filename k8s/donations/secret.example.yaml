# Exemplo de Secret da DonationAPI. NÃO commite valores reais.
# Uso: copie para secret.yaml, preencha e aplique (kubectl apply -f secret.yaml).
# Em AKS, prefira o Helm chart com Azure Key Vault (CSI) em vez deste Secret.
#
# Para demo local sem Cosmos: omita Cosmos__ConnectionString e rode com
# ASPNETCORE_ENVIRONMENT=Development (read store in-memory) no configmap.
apiVersion: v1
kind: Secret
metadata:
  name: hackatonfiap-donations-secret
  namespace: conexao-solidaria
type: Opaque
stringData:
  ConnectionStrings__Default: "Server=sqlserver,1433;Database=HackatonFiapDonationsDb;User Id=sa;Password=CHANGE_ME;TrustServerCertificate=true;"
  Jwt__Key: "CHANGE_ME_min_32_bytes_random_key________________"
  ServiceBus__ConnectionString: "CHANGE_ME"
  Cosmos__ConnectionString: "CHANGE_ME"
